    <g transform="translate(24 74)" font-family="Inter, Arial" font-size="13" font-weight="800">
      <rect width="472" height="42" rx="8" fill="#07131f"/><text x="16" y="27" fill="#fff">Document</text><text x="172" y="27" fill="#fff">System</text><text x="292" y="27" fill="#fff">Status</text><text x="390" y="27" fill="#fff">QA</text>
      <rect y="54" width="472" height="42" rx="8" fill="#f6f8fb"/><text x="16" y="81" fill="#07131f">Sample Asset</text><text x="172" y="81" fill="#526179">System A</text><text x="292" y="81" fill="#00894d">ready</text><text x="390" y="81" fill="#00894d">ok</text>
      <rect y="108" width="472" height="42" rx="8" fill="#f6f8fb"/><text x="16" y="135" fill="#07131f">Example File</text><text x="172" y="135" fill="#526179">System B</text><text x="292" y="135" fill="#8a5b00">review</text><text x="390" y="135" fill="#8a5b00">flag</text>
      <rect y="162" width="472" height="42" rx="8" fill="#f6f8fb"/><text x="16" y="189" fill="#07131f">Inspection Area 01</text><text x="172" y="189" fill="#526179">System C</text><text x="292" y="189" fill="#00894d">ready</text><text x="390" y="189" fill="#00894d">ok</text>
      <rect y="216" width="472" height="42" rx="8" fill="#f6f8fb"/><text x="16" y="243" fill="#07131f">Demo Record</text><text x="172" y="243" fill="#526179">System D</text><text x="292" y="243" fill="#2563eb">mapped</text><text x="390" y="243" fill="#00894d">ok</text>
