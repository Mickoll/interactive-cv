        <rect width="84" height="18" rx="9" fill="#13b981"/><rect x="96" width="134" height="18" rx="9" fill="#2563eb"/><rect x="242" width="72" height="18" rx="9" fill="#ffb020"/><rect x="326" width="146" height="18" rx="9" fill="#d6e0eb"/>
        <text x="0" y="52" fill="#526179" font-family="Inter, Arial" font-size="13" font-weight="800">ready / mapped / review / backlog</text>
      </g>
    </g>
